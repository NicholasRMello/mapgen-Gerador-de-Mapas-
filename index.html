<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGen — Procedural Map Generator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =============================================
       HEADER — main navigation bar
       Contains: logo, map controls, status
  ============================================= -->
  <header id="app-header">
    <div class="header-logo">
      <span class="logo-icon">⬡</span>
      <h1>MapGen</h1>
    </div>

    <nav class="header-controls">
      <button id="btn-generate" data-i18n="header.generate">Generate Map</button>

      <button id="btn-clear" data-i18n="header.clear">Clear</button>

      <input type="text" id="input-seed" placeholder="Seed (optional)" data-i18n-placeholder="header.seedPlaceholder" />

      <select id="select-size">
        <option value="small" data-i18n="header.sizeSmall">Small</option>
        <option value="medium" selected data-i18n="header.sizeMedium">Medium</option>
        <option value="large" data-i18n="header.sizeLarge">Large</option>
      </select>

      <button id="btn-lang" data-i18n="header.langToggle">PT-BR</button>
    </nav>

    <div class="header-status">
      <span id="status-text" data-i18n="header.noMap">No map generated.</span>
    </div>
  </header>

  <!-- =============================================
       MAIN LAYOUT — sidebar + canvas
  ============================================= -->
  <main id="app-main">

    <!-- -------------------------------------------
         LEFT SIDEBAR — user assets
         The user drags images from their computer to
         the drop-zone; each image is assigned a room type.
    ------------------------------------------- -->
    <aside id="panel-assets">

      <!-- Section: Room images -->
      <div class="sidebar-section">
        <button class="sidebar-section-header active" data-section="section-assets">
          <span class="section-arrow">&#9660;</span> <span data-i18n="sidebar.images">Images</span>
        </button>
        <div id="section-assets" class="sidebar-section-content">
          <div id="drop-zone">
            <span class="drop-icon">+</span>
            <span data-i18n-html="dropzone.text">Drag images here<br/>or click to select</span>
            <input type="file" id="file-input" accept="image/*" multiple hidden />
          </div>
          <div id="user-asset-list"></div>
        </div>
      </div>

      <!-- Section: Annotation pins -->
      <div class="sidebar-section">
        <button class="sidebar-section-header" data-section="section-pins">
          <span class="section-arrow">&#9654;</span> <span data-i18n="sidebar.pins">Pins</span>
        </button>
        <div id="section-pins" class="sidebar-section-content collapsed">
          <button id="btn-pin-mode" data-i18n="pin.addButton">📍 Add Pin</button>
          <div id="pin-list"></div>
        </div>
      </div>

    </aside>

    <!-- -------------------------------------------
         CANVAS — map rendering area
    ------------------------------------------- -->
    <section id="canvas-wrapper">
      <canvas id="map-canvas"></canvas>

      <!-- Loading overlay while generating -->
      <div id="canvas-overlay" class="hidden">
        <span data-i18n="overlay.generating">Generating map...</span>
      </div>
    </section>

    <!-- -------------------------------------------
         RIGHT SIDEBAR — properties / debug
    ------------------------------------------- -->
    <aside id="panel-info">
      <h2 data-i18n="details.title">Details</h2>

      <div id="room-details">
        <p data-i18n="details.placeholder">Click a room to see details.</p>
      </div>

      <hr />

      <div id="debug-panel">
        <h3 data-i18n="debug.title">Debug</h3>
        <pre id="debug-output"></pre>
      </div>
    </aside>

  </main>

  <!-- =============================================
       SCRIPTS — order matters!
       1. Utilities
       2. Core (generation)
       3. Rendering
       4. Main (entry point)
  ============================================= -->
  <script src="src/i18n.js"></script>
  <script src="src/utils/random.js"></script>
  <script src="src/utils/math.js"></script>
  <script src="src/core/assetLoader.js"></script>
  <script src="src/core/pinManager.js"></script>
  <script src="src/core/userAssets.js"></script>
  <script src="src/core/mapGenerator.js"></script>
  <script src="src/core/corridorBuilder.js"></script>
  <script src="src/render/renderer.js"></script>
  <script src="src/render/camera.js"></script>
  <script src="src/main.js"></script>
  <!-- =============================================
       MODAL — enlarged asset image preview
       Clicking on a .ua-card thumbnail, the user
       sees the image at full size.
  ============================================= -->
  <div id="img-preview-modal" class="hidden">
    <!-- Dark background — click to close -->
    <div id="img-preview-backdrop"></div>
    <!-- Image container -->
    <div id="img-preview-container">
      <button id="img-preview-close">✕</button>
      <img id="img-preview-img" src="" alt="Image preview" data-i18n-alt="preview.alt" />
    </div>
  </div>

</body>
</html>
