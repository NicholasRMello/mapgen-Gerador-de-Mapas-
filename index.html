<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGen — Procedural Map Generator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- =============================================
       HEADER — barra de navegação principal
       Contém: logo, controles do mapa, status
  ============================================= -->
  <header id="app-header">
    <div class="header-logo">
      <span class="logo-icon">⬡</span>
      <h1>MapGen</h1>
    </div>

    <nav class="header-controls">
      <!-- Botão para gerar novo mapa -->
      <button id="btn-generate">Gerar Mapa</button>

      <!-- Botão para limpar o canvas -->
      <button id="btn-clear">Limpar</button>

      <!-- Seed manual (opcional) -->
      <input type="text" id="input-seed" placeholder="Seed (opcional)" />

      <!-- Seletor de tamanho do mapa -->
      <select id="select-size">
        <option value="small">Pequeno</option>
        <option value="medium" selected>Médio</option>
        <option value="large">Grande</option>
      </select>
    </nav>

    <div class="header-status">
      <!-- Exibe informações sobre o mapa atual: seed, nº de salas, etc. -->
      <span id="status-text">Nenhum mapa gerado.</span>
    </div>
  </header>

  <!-- =============================================
       LAYOUT PRINCIPAL — sidebar + canvas
  ============================================= -->
  <main id="app-main">

    <!-- -------------------------------------------
         SIDEBAR ESQUERDA — assets do usuário
         O usuário arrasta imagens do computador para
         o drop-zone; cada imagem recebe um tipo de sala.
    ------------------------------------------- -->
    <aside id="panel-assets">

      <!-- Seção: Imagens de sala -->
      <div class="sidebar-section">
        <button class="sidebar-section-header active" data-section="section-assets">
          <span class="section-arrow">&#9660;</span> Imagens
        </button>
        <div id="section-assets" class="sidebar-section-content">
          <div id="drop-zone">
            <span class="drop-icon">+</span>
            <span>Arraste imagens aqui<br/>ou clique para selecionar</span>
            <input type="file" id="file-input" accept="image/*" multiple hidden />
          </div>
          <div id="user-asset-list"></div>
        </div>
      </div>

      <!-- Seção: Pinos de anotação -->
      <div class="sidebar-section">
        <button class="sidebar-section-header" data-section="section-pins">
          <span class="section-arrow">&#9654;</span> Pinos
        </button>
        <div id="section-pins" class="sidebar-section-content collapsed">
          <button id="btn-pin-mode">📍 Adicionar Pino</button>
          <div id="pin-list"></div>
        </div>
      </div>

    </aside>

    <!-- -------------------------------------------
         CANVAS — área de renderização do mapa
    ------------------------------------------- -->
    <section id="canvas-wrapper">
      <canvas id="map-canvas"></canvas>

      <!-- Overlay de loading enquanto gera -->
      <div id="canvas-overlay" class="hidden">
        <span>Gerando mapa...</span>
      </div>
    </section>

    <!-- -------------------------------------------
         SIDEBAR DIREITA — propriedades / debug
    ------------------------------------------- -->
    <aside id="panel-info">
      <h2>Detalhes</h2>

      <!-- Exibe propriedades da sala clicada no canvas -->
      <div id="room-details">
        <p>Clique em uma sala para ver detalhes.</p>
      </div>

      <hr />

      <!-- Painel de debug — exibe o estado interno do mapa -->
      <div id="debug-panel">
        <h3>Debug</h3>
        <pre id="debug-output"></pre>
      </div>
    </aside>

  </main>

  <!-- =============================================
       SCRIPTS — ordem importa!
       1. Utilitários
       2. Core (geração)
       3. Renderização
       4. Main (ponto de entrada)
  ============================================= -->
  <script src="src/utils/random.js"></script>
  <script src="src/utils/math.js"></script>
  <script src="src/core/assetLoader.js"></script>
  <script src="src/core/pinManager.js"></script>
  <script src="src/core/userAssets.js"></script>
  <script src="src/core/mapGenerator.js"></script>
  <script src="src/core/corridorBuilder.js"></script>
  <script src="src/render/renderer.js"></script>
  <script src="src/render/camera.js"></script>
  <script src="src/main.js"></script>
  <!-- =============================================
       MODAL — preview ampliado de imagem de asset
       Clicando no thumbnail de um .ua-card, o usuário
       vê a imagem em tamanho grande.
  ============================================= -->
  <div id="img-preview-modal" class="hidden">
    <!-- Fundo escuro — fechar ao clicar -->
    <div id="img-preview-backdrop"></div>
    <!-- Container da imagem -->
    <div id="img-preview-container">
      <button id="img-preview-close">✕</button>
      <img id="img-preview-img" src="" alt="Preview da imagem" />
    </div>
  </div>

</body>
</html>
